name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin ubuntu-22.04 (glibc 2.35) for portability — ubuntu-latest is
          # currently 24.04 which links against glibc 2.39 and breaks on any
          # distro a release or two behind. aarch64-linux is unaffected because
          # `cross` builds inside a Docker image with an older glibc baseline.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            cross: false
    steps:
      - uses: actions/checkout@v6

      # Bundled rustup matches the convention in ci.yml — no third-party
      # Rust setup actions.
      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      # `cross` runs the aarch64-linux build inside a Docker image with the
      # target toolchain preinstalled; ubuntu-latest already has Docker. The
      # native targets use bundled cargo directly.
      - name: Install cross (aarch64-linux only)
        if: matrix.cross
        run: cargo install cross --locked --version "^0.2"

      - name: Build release binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked -p aenv-cli --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --locked -p aenv-cli --target ${{ matrix.target }}

      # Package as <name>-<version>-<target>.tar.gz plus a .sha256 sidecar.
      # `shasum -a 256` is portable across Ubuntu (perl-base) and macOS.
      - name: Package tarball + checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="aenv-${version}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/aenv" "${staging}/"
          cp LICENSE README.md "${staging}/"
          (cd dist && tar -czf "${name}.tar.gz" "${name}")
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          echo "artifact_name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # `gh` is preinstalled on ubuntu-latest. --generate-notes pulls the
      # commit log since the previous tag for the release body.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "aenv ${version}" \
            --generate-notes \
            dist/*.tar.gz dist/*.tar.gz.sha256
